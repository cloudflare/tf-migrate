# Drift Exemptions for zero_trust_dlp_predefined_profile resource
#
# Resource-specific exemptions for cloudflare_zero_trust_dlp_predefined_profile

version: 1

exemptions:
  # The API returns enabled_entries as [] (empty list) but the config uses null (not set).
  # This causes perpetual [] -> null drift that cannot be fixed without breaking the API
  # contract (API rejects having both entries and enabled_entries fields).
  - name: "enabled_entries_empty_to_null"
    description: "The Cloudflare API returns 'enabled_entries' as an empty list ([]) for predefined DLP profiles even when no entries are explicitly enabled. The v5 provider represents an absent value as null in config. This causes a perpetual '[] -> null' difference that cannot be eliminated through configuration — the API contract does not allow both 'entries' and 'enabled_entries' to be set at the same time. This is a known provider behaviour and does not affect your DLP policy enforcement."
    patterns:
      - 'enabled_entries.*\[\].*null'
      - 'enabled_entries.*->.*null'
    enabled: true

  # name and open_access are Computed-only in v5 — the provider reads them from
  # the API and stores them in state, but they cannot be set in config. After
  # migration these fields show as (known after apply) on the first plan.
  # One-time drift that resolves after the first terraform apply.
  - name: "computed_only_fields"
    description: "name and open_access are Computed-only in v5 and become (known after apply) on the first plan after migration. Resolves after apply."
    resource_types:
      - "cloudflare_zero_trust_dlp_predefined_profile"
    patterns:
      - '~ name\s*=.*->.*\(known after apply\)'
      - '~ open_access\s*=.*->.*\(known after apply\)'
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
