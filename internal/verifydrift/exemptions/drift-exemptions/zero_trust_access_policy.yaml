# Drift Exemptions for zero_trust_access_policy resource

version: 1

exemptions:
  # Access policies with application_id show as "will be created" because
  # the v4 state entries are removed (they become inline policies).
  # The moved blocks handle the state migration for migratable policies.
  - name: "policy_state_migration"
    description: "Access policies may show as 'will be created' during initial v5 plan because v4 state entries were removed. The moved blocks handle proper state migration."
    resource_types:
      - "cloudflare_zero_trust_access_policy"
    allow_resource_creation: true
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
