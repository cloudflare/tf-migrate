# Drift Exemptions for argo resource
#
# v4 cloudflare_argo splits into cloudflare_argo_smart_routing (moved) and
# cloudflare_argo_tiered_caching (new). The tiered_caching resource must be
# created fresh — provider state upgraders cannot create new resources.
# Stabilizes after first apply.

version: 1

exemptions:
  - name: "argo_tiered_caching_creation"
    description: "The v4 cloudflare_argo resource has been split into two separate v5 resources: cloudflare_argo_smart_routing and cloudflare_argo_tiered_caching. The tiered caching resource does not exist in your v4 state and must be created fresh. This is expected — run terraform apply to create it and this change will not reappear."
    allow_resource_creation: true
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
