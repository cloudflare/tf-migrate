# Drift Exemptions for zero_trust_split_tunnel resource
#
# Resource-specific exemptions for the split_tunnel → device profile merge.
#
# cloudflare_split_tunnel is removed in v5. Its tunnels are merged into the
# device profile's exclude/include attribute. The split_tunnel state entries
# are stripped by the e2e runner (no v5 schema), so the removed {} blocks
# don't produce state errors. The device profile will show the newly-added
# exclude/include attribute as a change on the first v5 apply.

version: 1

exemptions:
  # The device profile gains exclude/include attributes that weren't in v4 state.
  # The v5 plan shows individual field changes within the exclude/include array
  # (address, description, host additions and reordering) as the API normalizes
  # the entries. This resolves after terraform apply.
  - name: "split_tunnel_merge_exclude_include_drift"
    description: "Split tunnel entries are merged into the device profile's exclude/include attribute during migration. The v4 state for the profile did not have these attributes, so the first v5 plan shows them as changes. This resolves after terraform apply."
    resource_types:
      - "cloudflare_zero_trust_device_default_profile"
      - "cloudflare_zero_trust_device_custom_profile"
    resource_name_patterns:
      - 'module\.zero_trust_split_tunnel\..*'
    patterns:
      - 'address\s+'
      - 'description\s+'
      - 'host\s+'
      - 'exclude\s+'
      - 'include\s+'
    enabled: true

  # The v4 provider set tunnel_protocol = "wireguard" explicitly, but the v5
  # provider normalizes the default differently (empty string). This is a
  # provider-level normalization difference, not a split tunnel migration issue.
  - name: "split_tunnel_tunnel_protocol_normalization"
    description: "The v5 provider normalizes tunnel_protocol differently than v4. The value 'wireguard' was the default in v4 but the v5 provider may clear it. Resolves after terraform apply."
    resource_types:
      - "cloudflare_zero_trust_device_default_profile"
      - "cloudflare_zero_trust_device_custom_profile"
    resource_name_patterns:
      - 'module\.zero_trust_split_tunnel\..*'
    patterns:
      - 'tunnel_protocol'
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
