# Drift Exemptions for zero_trust_gateway_settings resource
#
# Resource-specific exemptions for cloudflare_zero_trust_gateway_settings
# (formerly cloudflare_teams_account)

version: 1

exemptions:
  # In v5, logging and proxy settings are split into separate standalone resources.
  # These don't exist in v4 state, so they need to be created after migration.
  # This is expected behavior for the v4→v5 migration.
  - name: "new_logging_resource"
    description: "In v5, gateway logging settings have been extracted from cloudflare_teams_account into a dedicated cloudflare_zero_trust_gateway_logging resource. This resource does not exist in your v4 state so Terraform will plan to create it. This is expected — your logging configuration is carried forward correctly. Run terraform apply to create the resource; it will not reappear on subsequent plans."
    resource_types:
      - "cloudflare_zero_trust_gateway_logging"
    allow_resource_creation: true
    enabled: true

  - name: "new_device_settings_resource"
    description: "In v5, device settings have been extracted from cloudflare_teams_account into a dedicated cloudflare_zero_trust_device_settings resource. This resource does not exist in your v4 state so Terraform will plan to create it. This is expected — your device settings are carried forward correctly. Run terraform apply to create the resource; it will not reappear on subsequent plans."
    resource_types:
      - "cloudflare_zero_trust_device_settings"
    allow_resource_creation: true
    enabled: true

  # block_page optional/computed fields that the API always populates with defaults
  # but that users typically don't set in their config. This causes perpetual drift
  # because the API returns these values but the config has them as null.
  # This is a known pre-existing v5 provider behavior, not caused by migration.
  - name: "block_page_api_default_fields"
    description: "The Cloudflare API always returns certain block_page fields (mode, include_context, suppress_footer, target_uri, mailto_address, mailto_subject) with default values even when you have not set them in your config. The v5 provider reads these back on every plan and may show them as being removed. This is a known v5 provider behaviour unrelated to the migration — your block page configuration and appearance are not affected."
    resource_types:
      - "cloudflare_zero_trust_gateway_settings"
    patterns:
      - '\-\s+mode\s*='
      - '\-\s+include_context\s*='
      - '\-\s+suppress_footer\s*='
      - '\-\s+target_uri\s*='
      - '\-\s+mailto_address\s*='
      - '\-\s+mailto_subject\s*='
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
