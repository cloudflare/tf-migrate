version: 1

exemptions:
  - name: "precedence_recalculation"
    description: "The Cloudflare API may automatically recalculate and reorder precedence values for device profiles during migration. The relative ordering of your profiles is preserved. This change is safe and resolves after the next terraform apply."
    resource_types:
      - "cloudflare_zero_trust_device_custom_profile"
    patterns:
      - 'precedence.*->'
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: true
