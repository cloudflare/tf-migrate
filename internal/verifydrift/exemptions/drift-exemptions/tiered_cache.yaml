# Drift Exemptions for tiered_cache resource
#
# v4 cloudflare_tiered_cache with cache_type="generic" splits into
# cloudflare_tiered_cache (value="off") and cloudflare_argo_tiered_caching (new).
# The argo_tiered_caching resource must be created fresh.
# Stabilizes after first apply.

version: 1

exemptions:
  - name: "tiered_cache_argo_creation"
    description: "In v4, a cloudflare_tiered_cache resource with cache_type='generic' is replaced in v5 by two resources: cloudflare_tiered_cache (set to 'off') and a new cloudflare_argo_tiered_caching resource. The argo tiered caching resource has no equivalent in your v4 state and must be created by Terraform. This is expected — run terraform apply to create it and this change will not reappear."
    allow_resource_creation: true
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
