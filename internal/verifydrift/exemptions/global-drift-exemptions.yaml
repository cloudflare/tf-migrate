# Global Drift Exemptions
#
# These exemptions apply to ALL resources unless overridden by resource-specific configs.
# Use for common patterns: computed fields, known provider behaviors, etc.

version: 1

exemptions:
  # Standard computed field exemptions
  - name: "computed_value_refreshes"
    description: "Some attributes are marked as '(known after apply)' because their value is computed server-side and cannot be known until after the next apply. This is normal Terraform behavior and not caused by the migration. These changes are safe to ignore — they will resolve automatically after running terraform apply."
    patterns:
      - '\(known after apply\)'
      - '= \{\} -> null'
    enabled: true

  # HTML entity encoding differences between v4 and v5 providers
  - name: "html_entity_encoding"
    description: "The v4 and v5 providers encode special characters differently in string fields. The v4 provider stored HTML entities (e.g. &#39; for single quotes, &amp; for ampersands) while the v5 provider uses the literal characters. The underlying values are identical — this is a cosmetic representation difference that resolves after the next terraform apply."
    patterns:
      - '&#39;.*->.*\x27'     # &#39; -> ' (single quote)
      - '&#34;.*->.*"'        # &#34; -> " (double quote)
      - '&amp;.*->.*&'        # &amp; -> & (ampersand)
      - '\x27.*->.*&#39;'     # ' -> &#39; (reverse direction)
      - '".*->.*&#34;'        # " -> &#34; (reverse direction)
      - '&.*->.*&amp;'        # & -> &amp; (reverse direction)
    enabled: true

# Global settings
settings:
  apply_exemptions: true
  verbose_exemptions: false

  # Warn if exemption doesn't match anything (helps catch stale exemptions)
  warn_unused_exemptions: false

  # Load resource-specific exemption configs
  load_resource_exemptions: true
