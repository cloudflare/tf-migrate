# Drift Exemptions for zone_dnssec resource
#
# Resource-specific exemptions for cloudflare_zone_dnssec
#
# V4 -> V5 changes:
# - status: Computed (v4) -> Optional (v5), values: pending/active -> active/disabled
# - modified_on: Optional+Computed (v4) -> Computed only (v5)

version: 1

exemptions:
  # v4 to v5 status normalization: v4 had 4 values, v5 has 2
  # v4: active, pending, disabled, pending-disabled
  # v5: active, disabled
  # Mapping: (pending -> active), (pending-disabled -> disabled)
  - name: "status_normalization_pending_to_active"
    description: "The v4 provider used four DNSSEC status values (active, pending, disabled, pending-disabled). The v5 provider simplifies this to two values (active, disabled), where 'pending' maps to 'active'. If your DNSSEC was in a 'pending' state during migration, the plan will show 'status = \"pending\" -> \"active\"'. Your DNSSEC configuration is not changed — this reflects the same operational state under a simplified naming scheme. This drift resolves after the next terraform apply."
    patterns:
      - 'status.*=.*"pending".*->.*"active"'
      - '~ status\s*=\s*"pending"\s*->\s*"active"'
    enabled: true

  - name: "status_normalization_pending_disabled_to_disabled"
    description: "The v4 provider used four DNSSEC status values (active, pending, disabled, pending-disabled). The v5 provider simplifies this to two values (active, disabled), where 'pending-disabled' maps to 'disabled'. If your DNSSEC was in a 'pending-disabled' state during migration, the plan will show 'status = \"pending-disabled\" -> \"disabled\"'. Your DNSSEC configuration is not changed. This drift resolves after the next terraform apply."
    patterns:
      - 'status.*=.*"pending-disabled".*->.*"disabled"'
      - '~ status\s*=\s*"pending-disabled"\s*->\s*"disabled"'
    enabled: true

  # NOTE: status_pending_to_null exemption removed — it was fully subsumed by status_to_null below.

  # Status field drift when migration doesn't preserve state value.
  # Covers status going to null (removal) for all possible status values.
  - name: "status_to_null"
    description: "The v4 provider stored DNSSEC status as a Computed attribute. During migration, the status may not be preserved in state, causing the plan to show the status being removed. Your DNSSEC configuration is not changed. This drift resolves after the next terraform apply."
    patterns:
      - 'status\s*=\s*"pending"\s*->\s*null'
      - 'status\s*=\s*"active"\s*->\s*null'
      - 'status\s*=\s*"disabled"\s*->\s*null'
      - '-\s*status\s*=\s*"pending"\s*->\s*null'
      - '-\s*status\s*=\s*"active"\s*->\s*null'
      - '-\s*status\s*=\s*"disabled"\s*->\s*null'
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
