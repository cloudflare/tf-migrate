# Zero Trust Access Application Drift Exemptions
#
# These exemptions handle expected drift from v4->v5 migration where the v5 provider
# normalizes state by omitting default/empty values that v4 explicitly stored.

version: 1

exemptions:
  # Boolean fields that drift from false to null
  - name: "access_app_boolean_defaults"
    description: "v4 provider stores explicit false for optional booleans, v5 provider omits them when false. Provider normalizes state after first apply."
    patterns:
      - '(skip_interstitial|auto_redirect_to_identity|enable_binding_cookie|options_preflight_bypass|service_auth_401_redirect|allow_pkce_without_client_secret)\s*=\s*false\s*->\s*null'
      - '-\s+(skip_interstitial|auto_redirect_to_identity|enable_binding_cookie|options_preflight_bypass|service_auth_401_redirect|allow_pkce_without_client_secret)\s*=\s*false\s*->\s*null'
    enabled: true

  # Empty array fields that drift to null
  - name: "access_app_empty_arrays"
    description: "v4 provider stores explicit empty arrays [], v5 provider omits them when empty. Provider normalizes state after first apply."
    patterns:
      - '(allowed_idps|tags)\s*=\s*\[\]\s*->\s*null'
      - '-\s+(allowed_idps|tags)\s*=\s*\[\]\s*->\s*null'
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
