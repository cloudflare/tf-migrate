# Zero Trust Access Policy Drift Exemptions
#
# These exemptions handle expected drift from v4->v5 migration where the v5 provider
# normalizes state by omitting default/empty values that v4 explicitly stored.

version: 1

exemptions:
  # Boolean fields that drift from false to null
  - name: "access_policy_boolean_defaults"
    description: "v4 provider stores explicit false for optional booleans, v5 provider omits them when false. Provider normalizes state after first apply."
    patterns:
      - '(approval_required|isolation_required|purpose_justification_required)\s*=\s*false\s*->\s*null'
      - '-\s+(approval_required|isolation_required|purpose_justification_required)\s*=\s*false\s*->\s*null'
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
