# Drift Exemptions for zero_trust_gateway_policy resource
#
# Provider bugs causing ongoing drift:
# 1. Duration format normalization: provider reads "24h" as "24h0m0s"
# 2. Computed defaults not stabilizing: command_logging, block_page_enabled, ip_categories

version: 1

exemptions:
  - name: "duration_normalization"
    description: "The v5 provider normalises duration values to Go's full duration format when reading from the API. For example, a value you set as '24h' in config will be read back as '24h0m0s'. This is a display-only difference — the actual duration enforced by the gateway policy is identical. This is a known v5 provider behaviour that may persist across plans."
    patterns:
      - 'duration.*0m0s.*->'
      - '~ duration'
    enabled: true

  - name: "audit_ssh_computed_defaults"
    description: "The 'command_logging' field inside an 'audit_ssh' block is a computed field that defaults to true when an SSH audit rule is created. The v5 provider always reads this value back from the API, which may cause it to appear in the plan even when you have not set it explicitly. Your SSH audit logging configuration is not affected."
    patterns:
      - 'command_logging = true'
      - 'audit_ssh\s*=\s*\{'
    enabled: true

  - name: "rule_settings_computed_defaults"
    description: "The fields 'block_page_enabled' and 'ip_categories' are computed defaults set by the Cloudflare API and not required in your config. The v5 provider reads them back on every plan and may show them as changing to false. Your gateway policy rules and their enforcement are not affected."
    patterns:
      - 'block_page_enabled.*=.*false'
      - 'ip_categories.*=.*false'
    enabled: true

  - name: "precedence_normalization"
    description: "The v5 provider renumbers gateway policy precedence values during the state upgrade — large legacy values (e.g. 200895) are replaced with smaller sequential numbers. The relative ordering of your policies is preserved. This change is safe and resolves after the next terraform apply."
    patterns:
      - '~ precedence\s*='
      - 'precedence\s*=\s*\d{4,}\s*->\s*\d{1,4}'
    enabled: true

  - name: "filters_computed_to_null"
    description: "The 'filters' field was computed by the v4 provider based on the traffic rule but was not explicitly set in config. After migration, the v5 provider detects that state has a value but config does not specify it, showing 'filters = [\"dns\"] -> null'. This is expected drift when the v4 config relied on implicit filter inference. The policy behavior is unchanged."
    patterns:
      - '-\s*filters\s*=\s*\['
      - 'filters.*->.*null'
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
