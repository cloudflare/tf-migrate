# Drift Exemptions for zone_setting resource
#
# Resource-specific exemptions for cloudflare_zone_setting
#
# The v4 cloudflare_zone_settings_override resource is deleted from state and splits
# into multiple v5 cloudflare_zone_setting resources. This causes expected initial
# drift where all v5 resources need to be created via terraform apply.

version: 1

exemptions:
  # One-to-many transformation: v4 zone_settings_override -> multiple v5 zone_setting
  - name: "zone_setting_migration_drift"
    description: "In v4, all zone settings were managed by a single cloudflare_zone_settings_override resource. In v5, each setting is its own cloudflare_zone_setting resource. tf-migrate converts your config from one resource to many, but the v4 state entry is removed and the new v5 resources do not yet exist in state. Terraform will plan to create all of the new zone_setting resources. This is expected — your zone settings in Cloudflare are not changed, and after terraform apply all settings will be tracked individually in state."
    allow_resource_creation: true
    enabled: true

  - name: "zone_setting_value_type_coercion"
    description: "In v4, the cloudflare_zone_settings_override resource used individually-typed attributes for each setting (e.g. max_upload was TypeInt). In v5, cloudflare_zone_setting uses a single DynamicAttribute for 'value' that normalizes all values. The migrator writes the value as an integer (e.g. value = 300) matching the v4 type, but the v5 provider normalizes it to a string (value = \"300\"). The underlying setting is unchanged. The drift resolves after running terraform apply."
    resource_types:
      - "cloudflare_zone_setting"
    patterns:
      - 'value\s+=\s+\d+\s+->\s+"\d+"'
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
