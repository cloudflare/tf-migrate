# Drift Exemptions for workers_secret resource
#
# v4 cloudflare_workers_secret / cloudflare_worker_secret resources are folded
# into cloudflare_workers_script bindings in v5. The secrets were managed via
# the Workers Secrets API in v4 but become secret_text bindings on the parent
# script in v5. This causes expected drift on the first plan:
#
# - New secret_text bindings appear as additions to the bindings list
# - Existing bindings may reorder (concat merges secret bindings at the end)
#
# Stabilizes after first apply.

version: 1

exemptions:
  - name: "workers_secret_folded_into_bindings"
    description: "Worker secrets are folded into workers_script bindings in v5. The first plan will show binding additions and reordering. This is expected and resolves after terraform apply."
    resource_types:
      - "cloudflare_workers_script"
    resource_name_patterns:
      - "module.workers_secret.*"
    patterns:
      - 'type.*=.*"secret_text"'
      - 'text.*=.*\(sensitive value\)'
      - 'name.*=.*"API_KEY"'
      - 'name.*=.*"DB_PASSWORD"'
      - 'name.*=.*"JWT_SECRET"'
      - 'name.*=.*"SINGULAR_SECRET"'
      - 'name.*=.*"LITERAL_SECRET"'
      - 'name.*=.*"EXTRA_SECRET"'
      - 'name.*=.*"MY_KV"'
      - 'name.*=.*"ENV"'
      - 'namespace_id'
      - 'type.*=.*"kv_namespace"'
      - 'type.*=.*"plain_text"'
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
