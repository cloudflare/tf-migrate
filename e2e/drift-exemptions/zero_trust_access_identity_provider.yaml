# Drift Exemptions for zero_trust_access_identity_provider resource
#
# Provider state upgrader doesn't populate all fields during v4→v5 migration.
# These fields exist in config but are missing from state after upgrade.
# Drift stabilizes after first apply.

version: 1

exemptions:
  - name: "azure_conditional_access_enabled"
    description: "After migration, the v5 provider's state upgrader does not carry forward the 'conditional_access_enabled' field for Azure AD identity providers when it was set to false in v4. The plan will show this field being added with value false. Your Conditional Access policy enforcement is not affected. This drift resolves after the next terraform apply."
    patterns:
      - 'conditional_access_enabled.*false'
    enabled: true

  - name: "azure_support_groups"
    description: "After migration, the v5 provider's state upgrader does not carry forward the 'support_groups' field for Azure identity providers. The plan will show this field being set to false. Your Azure group sync configuration is not affected. This drift resolves after the next terraform apply."
    patterns:
      - 'support_groups.*false'
    enabled: true

  - name: "saml_idp_public_certs"
    description: "The v4 provider stored a single SAML IdP public certificate as 'idp_public_cert'. The v5 provider uses 'idp_public_certs' (a list). The state upgrader does not automatically convert the singular field to the list, so the plan will show 'idp_public_certs' as changing. Your SAML identity provider and its certificate are not affected. This drift resolves after the next terraform apply."
    patterns:
      - 'idp_public_certs'
    enabled: true

settings:
  apply_exemptions: true
  verbose_exemptions: false
